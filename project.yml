name: CardCollection
options:
  bundleIdPrefix: com.cardcollection
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  CardCollection:
    type: application
    platform: iOS
    sources:
      - path: CardCollection
      - path: CardCollection.xcdatamodeld
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSCameraUsageDescription: "This app needs camera access to scan QR codes on PSA cards"
        PRODUCT_BUNDLE_IDENTIFIER: com.cardcollection.app
        PRODUCT_NAME: CardCollection
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_STRICT_CONCURRENCY: minimal
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
    dependencies: []
    info:
      path: CardCollection/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: CardCollection
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "This app needs camera access to scan QR codes on PSA cards"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
  CardCollectionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CardCollectionTests
    dependencies:
      - target: CardCollection
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cardcollection.tests
        SWIFT_STRICT_CONCURRENCY: minimal
        GENERATE_INFOPLIST_FILE: YES
